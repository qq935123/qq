<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic&family=Noto+Sans+TC&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>🍄果實價值計算器</title>
</head>

<style>
body{
  font-family: "Zen Maru Gothic", "Noto Sans TC", sans-serif;
  text-align:center;
  background:white;
}

.box{
  background:#B0E0E6;
  padding:20px;
  margin:20px auto;
  width:90%;
  max-width:400px;
  border-radius:15px;
  box-shadow:0 0 10px rgba(0,0,0,0.2);
}

button{
  margin:5px;
  padding:8px;
  border-radius:10px;
  border:none;
  font-family: inherit;
  font-size:14px;
  min-width:70px;
}

.selected{
  box-shadow:
    0 0 5px #fff,
    0 0 10px #ffe066,
    0 0 20px #ffd770;
  transform:scale(1.1);
}

#result{
  margin-top:20px;
  font-size:24px;
  color:#d35400;
}

input, select{
  margin:5px;
  padding:5px;
  width:80%;
}
</style>
</head>

<body>

<div class="box">
<h2>🍄果實價值計算器</h2>

<h3>果實種類</h3>
<select id="fruitSelect">
  <option value="0">-</option>
  <option value="10148">仙人掌象</option>
  <option value="50000">驚奇菇</option>
  <option value="33000">魔鬼朝天椒</option>
  <option value="24850">大王菊</option>
  <option value="24850">葡萄</option>
  <option value="5254.1">蟠桃</option>
  <option value="4618.8">松果</option>
  <option value="369.82">向日葵</option>
  <option value="3698.2">向日葵-笑日葵</option>
  <option value="11475.435">草莓-連體</option>
  <option value="7650.29">草莓</option>
  <option value="2151.65">奇異狗</option>
  <option value="202.48">榴槤</option>
  <option value="790.17">荔枝</option>
  <option value="1645">櫻桃</option>
  <option value="4969.02">香蕉-香蕉猴</option>
  <option value="2484.51">香蕉</option>
  <option value="527">石榴</option>
  <option value="283.08">蘋果-糖葫蘆</option>
  <option value="188.72">蘋果</option>
  <option value="145">椰子</option>
  <option value="25.92">南瓜-萬聖夜</option>
  <option value="12.96">南瓜</option>
  <option value="2550">棉花</option>
  <option value="103.52">玉米</option>
  <option value="2300">牽牛花</option>
  <option value="539.35">橘子</option>
  <option value="486.86">梨</option>
  <option value="16.065">西瓜-方形</option>
  <option value="10.71">西瓜</option>
  <option value="279.72">白菜</option>
  <option value="12.24">竹子</option>
  <option value="430.32">黃瓜-黃瓜蛇</option>
  <option value="215.16">黃瓜</option>
  <option value="285">大豆</option>
  <option value="43.54">波斯菊</option>
  <option value="688.53">香菇</option>
  <option value="65.16">番茄</option>
  <option value="39.42">馬鈴薯-洋芋片</option>
  <option value="26.28">馬鈴薯</option>
</select>

<h3>重量</h3>
<input type="number" id="weight" placeholder="輸入重量" min="0">
<p>
🍄 最大重量：<span id="maxWeightText">-</span>
｜ 📊 百分比：<span id="weightPercent">-</span>
</p>

<h3>品質選擇</h3>
<div id="qualityButtons"></div>
<p>已選品質：<span id="selectedQuality"></span></p>

<h3>
🌦️ 天氣詞條 
<button onclick="resetWeather()">重選</button>
</h3>
<div id="weatherButtons"></div>
<p>已選天氣：<span id="selectedList"></span></p>

<button onclick="calc()">計算</button>
<div id="result"></div>
</div>

<div id="author">製作by緣風</div>

<script>

let maxWeightData = {
  "仙人掌象":34,
  "驚奇菇":10.2,
  "魔鬼朝天椒":10.2,
  "大王菊":10.2,
  "葡萄":10.2,
  "蟠桃":21,
  "松果":17,
  "向日葵":51,
  "向日葵-笑日葵":51,
  "草莓-連體":8.5,
  "草莓":8.5,
  "奇異狗":13.5,
  "榴槤":61.5,
  "荔枝":24.5,
  "櫻桃":10.2,
  "香蕉-香蕉猴":10.2,
  "香蕉":10.2,
  "石榴":21,
  "蘋果-糖葫蘆":37.4,
  "蘋果":37.4,
  "椰子":42,
  "南瓜-萬聖夜":205,
  "南瓜":205,
  "棉花":5.2,
  "玉米":46.5,
  "牽牛花":5.6,
  "橘子":13.5,
  "梨":13.5,
  "西瓜-方形":170,
  "西瓜":170,
  "白菜":10.5,
  "竹子":140,
  "黃瓜-黃瓜蛇":13.5,
  "黃瓜":13.5,
  "大豆":3.6,
  "波斯菊":35,
  "香菇":3.4,
  "番茄":11,
  "馬鈴薯-洋芋片":12,
  "馬鈴薯":12
};

let fruitSelect = document.getElementById("fruitSelect");

fruitSelect.addEventListener("change", function(){

  function resetAll(){

    // 1️⃣清空重量
    document.getElementById("weight").value = "";

    // 2️⃣ 清空百分比
    document.getElementById("weightPercent").innerText = "-";

    // 3️⃣ 清空品質
    selectedQuality = null;
    document.getElementById("selectedQuality").innerText = "";

    document.querySelectorAll("#qualityButtons button").forEach(btn=>{
      btn.classList.remove("selected");
    });

    // 4️⃣ 清空天氣
    selectedWeather = [];
    document.getElementById("selectedList").innerText = "";

    document.querySelectorAll("#weatherButtons button").forEach(btn=>{
      btn.classList.remove("selected");
    });

    // 5️⃣ 清空結果
    document.getElementById("result").innerText = "";

    // 6️⃣ 清空最大重量
    document.getElementById("maxWeightText").innerText = "-";
  }

  // ⭐⭐⭐ 這行是關鍵！！
  resetAll();

  let fruitName = fruitSelect.options[fruitSelect.selectedIndex].text;
  
  let max = maxWeightData[fruitName];
  
  if(max){
    document.getElementById("maxWeightText").innerText = max + " kg";
  }else{
    document.getElementById("maxWeightText").innerText = "-";
  }

});
// 品質按鈕
let qualityData = [
  {name:"普通", value:1, color:"#cccccc"},
  {name:"銀", value:3, color:"#6ccf5f"},
  {name:"金", value:10, color:"#4da6ff"},
  {name:"水晶", value:20, color:"#ff9933"},
  {name:"流光", value:30, color:"linear-gradient(45deg, red, orange, yellow, green, blue, purple)"}
];
// 重選天氣
function resetWeather(){
  selectedWeather = [];
  
  // 清除所有按鈕選取效果
  document.querySelectorAll("#weatherButtons button").forEach(btn=>{
    btn.classList.remove("selected");
  });

  // 清空顯示文字
  document.getElementById("selectedList").innerText = "";
}

let selectedQuality = null;

// 建立品質按鈕
let qualityContainer = document.getElementById("qualityButtons");
qualityData.forEach(q=>{
  let btn = document.createElement("button");
  btn.innerText = q.name;
  if(q.name=="流光"){
    btn.style.background="linear-gradient(45deg, red, orange, yellow, green, blue, purple)";
    btn.style.color="white";
  }else{
    btn.style.background=q.color;
    btn.style.color="white";
  }
  btn.onclick = function(){
    selectedQuality=q;
    document.getElementById("selectedQuality").innerText=q.name;
    document.querySelectorAll("#qualityButtons button").forEach(b=>b.classList.remove("selected"));
    btn.classList.add("selected");
  }
  qualityContainer.appendChild(btn);
});

// 天氣詞條
let values = {
  "潮濕":1,"顫慄":1,
  "覆雪":2,"迷霧":2,"生機":2,"結霜":2,"灼熱":2,"沙塵":2,
  "落雷":3,
  "冰凍":4,"陶化":4,
  "彩虹":5,"螢光":5,"血月":5,"極光":5,"幽魂":5,"驚魂夜":5,
  "星環":10,"亮晶晶":10,"瓷化":8,
  "霓虹":18
};

let grayList = ["潮濕","顫慄","覆雪","迷霧","生機","結霜","灼熱","沙塵"];
let greenList = ["落雷","冰凍","陶化"];
let blueList = ["彩虹","螢光","血月","極光","幽魂","驚魂夜"];
let purpleList = ["星環","亮晶晶","瓷化"];
let rainbowList = ["霓虹"];

let selectedWeather = [];
let container = document.getElementById("weatherButtons");
Object.keys(values).forEach(name=>{
  let btn = document.createElement("button");
  btn.innerText=name;
  if(grayList.includes(name)) btn.style.background="#bbb";
  else if(greenList.includes(name)) btn.style.background="#6ccf5f";
  else if(blueList.includes(name)) {btn.style.background="#4da6ff"; btn.style.color="white";}
  else if(purpleList.includes(name)) {btn.style.background="#a64dff"; btn.style.color="white";}
  else if(rainbowList.includes(name)) btn.style.background="linear-gradient(45deg, red, orange, yellow, green, blue, purple)";

  btn.onclick = function(){
    if(selectedWeather.includes(name)){
      selectedWeather=selectedWeather.filter(e=>e!==name);
      btn.classList.remove("selected");
    }else{
      selectedWeather.push(name);
      btn.classList.add("selected");
    }
    document.getElementById("selectedList").innerText=selectedWeather.join(",");
  }

  container.appendChild(btn);
});

// 天氣倍率
function getWeather(){
  let list=[...selectedWeather];
  if(list.includes("冰凍")) list=list.filter(e=>"結霜"!==e);
  if(list.includes("瓷化")) list=list.filter(e=>"陶化"!==e && e!=="灼熱");
  let sum=0;
  list.forEach(e=>sum+=values[e]);
  return 1+sum;
}

// 格式化數字
function formatValue(num){
  if(num>=1000000) return (num/1000000).toFixed(1)+"m";
  if(num>=1000) return (num/1000).toFixed(1)+"k";
  return num.toFixed(1);
}

// 計算
function calc(){
  let fruitSelect = document.getElementById("fruitSelect");
  let fruitValue = Number(fruitSelect.value);

  let weight = Number(document.getElementById("weight").value);
  if(isNaN(weight)||weight<=0){alert("請輸入正確重量"); return;}

  if(!selectedQuality){alert("請先選擇品質"); return;}
  let quality = selectedQuality.value;

  let weather = getWeather();
  let total = fruitValue*(weight**1.5)*quality*weather;
  document.getElementById("result").innerText = "🍄 最終價值：" + formatValue(total) + " ｜ 🌦️倍率：" + weather;
}
let weightInput = document.getElementById("weight");

weightInput.addEventListener("input", function(){
  let fruitName = fruitSelect.options[fruitSelect.selectedIndex].text;
  let weight = parseFloat(weightInput.value);

  let max = maxWeightData[fruitName];

  if(!max || isNaN(weight) || weight <= 0){
    document.getElementById("weightPercent").innerText = "-";
    return;
  }

  let percent = (weight / max * 100).toFixed(1);

  document.getElementById("weightPercent").innerText = percent + " %";
});

</script>
</body>
</html>
